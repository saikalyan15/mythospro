<svg width="1128" height="191" viewBox="0 0 1128 191" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bnBg" x1="0" y1="0" x2="1128" y2="191" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16132e"/>
      <stop offset="0.55" stop-color="#0b0a1d"/>
      <stop offset="1" stop-color="#060512"/>
    </linearGradient>
    <linearGradient id="bnPro" x1="612" y1="60" x2="720" y2="105" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818cf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="bnGlow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#6366f1" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1128" height="191" fill="url(#bnBg)"/>

  <!-- Ambient glows (decorative, edge-safe) -->
  <ellipse cx="564" cy="40" rx="420" ry="220" fill="url(#bnGlow)"/>
  <ellipse cx="940" cy="170" rx="280" ry="170" fill="url(#bnGlow)"/>

  <!-- Centered content block. Kept in the horizontal/vertical center so the
       desktop logo overlay (bottom-left) and mobile center-crop never clip it. -->

  <!-- Accent line above -->
  <line x1="514" y1="52" x2="614" y2="52" stroke="#818cf8" stroke-opacity="0.45" stroke-width="2"/>

  <!-- Wordmark -->
  <text x="564" y="104" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#f4f4f5">Mythos</tspan><tspan fill="url(#bnPro)">Pro</tspan>
  </text>

  <!-- Tagline -->
  <text x="564" y="138" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="600" fill="#d4d4d8">
    Focused software for professionals.
  </text>

  <!-- Sub-line / URL -->
  <text x="564" y="166" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="500" fill="#818cf8">
    eaascanner.com
  </text>
</svg>
